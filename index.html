<style>
  :root {
    --bg: #141210;
    --surface: #1E1B18;
    --card: #1E1B18;
    --line: #2C2722;

    --primary: #F2752B;
    --on-primary: #14110D;
    --accent: #15B5A6;
    --on-accent: #141210;

    --text: #F4EEE3;
    --ink: #F4EEE3;
    --muted: #A99E92;
    --link: #15B5A6;

    --strong: #C24A2C;   /* Force */
    --fast: #29C4D6;     /* Endurance */
    --happy: #F4A23A;    /* Jour 5 */
    --healthy: #15B5A6;

    --pending: #E0A24A;
    --pending-bg: rgba(242,117,43,.14);

    --speed-strong: #F2752B;
    --rest-strong: #8A8079;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Work Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

  header { background: var(--surface); color: var(--text); padding: 12px 18px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--line); }
  .brand-row { display: flex; align-items: center; gap: 12px; }
  .brand-row .logo-wordmark { flex: 0 0 auto; }
  .brand-row .logo-wordmark svg { height: 34px; width: auto; display: block; }
  .brand-meta { display: flex; flex-direction: column; line-height: 1.3; }
  .brand-meta .app-name { font-family: "Bricolage Grotesque", "Work Sans", sans-serif; font-weight: 800; letter-spacing: 1.5px; font-size: 12px; color: var(--muted); text-transform: uppercase; }
  header .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .controls { display: flex; gap: 8px; padding: 12px 14px; background: var(--bg); border-bottom: 1px solid var(--line); overflow-x: auto; }
  .pill { border: 1px solid var(--line); background: var(--surface); color: var(--text); padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .pill.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
  .pill:hover:not(.active) { background: #262019; }

  main { padding: 14px; max-width: 800px; margin: 0 auto; }
  .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .day-tabs .pill { font-size: 12px; padding: 6px 12px; }
  .day-tabs .pill.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }

  .session { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .session h2 { margin: 0; padding: 12px 16px; color: var(--text); font-family: "Bricolage Grotesque", "Work Sans", sans-serif; font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .session h2 .tag { font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; background: rgba(0,0,0,.22); padding: 2px 6px; border-radius: 4px; }
  .subhead { padding: 8px 16px 8px 13px; font-size: 12px; font-weight: 600; color: var(--text); background: rgba(244,238,227,.04); border-left: 3px solid var(--line); }

  .session.s-A h2, .session.s-B h2, .session.s-C h2, .session.s-D h2 { background: var(--strong); color: var(--text); }
  .session.s-A .subhead, .session.s-B .subhead, .session.s-C .subhead, .session.s-D .subhead { border-left-color: var(--strong); }

  .session .subhead.bloc-prep { opacity: .92; }
  .session .subhead.bloc-A::before { content: "Bloc A - "; font-weight: 700; color: var(--strong); }
  .session .subhead.bloc-B::before { content: "Bloc B - "; font-weight: 700; color: var(--strong); }
  .session .subhead.bloc-C { background: var(--pending-bg); border-left-color: var(--primary); }
  .session .subhead.bloc-C::before { content: "Bloc C - "; font-weight: 700; color: var(--primary); }

  .session.endurance h2 { background: var(--fast); color: var(--on-accent); }
  .session.endurance .subhead { border-left-color: var(--fast); }

  .run-step { display: flex; gap: 12px; padding: 9px 16px; border-top: 1px solid var(--line); font-size: 13px; align-items: baseline; }
  .run-step .lbl { color: var(--fast); font-weight: 700; font-size: 12px; min-width: 96px; flex: 0 0 auto; }
  .run-step .val { color: var(--text); }
  .run-step.main { background: rgba(41,196,214,.06); }
  .run-step.main .val { font-weight: 600; }
  .alt-or { color: var(--muted); font-weight: 400; font-size: 12px; }

  .session.day5 h2 { background: var(--happy); color: var(--on-primary); }
  .session.day5 .subhead { border-left-color: var(--happy); }
  .session.day5 .option-tabs .pill.active[data-opt="density"] { background: var(--happy); border-color: var(--happy); color: var(--on-primary); }
  .session.day5 .option-tabs .pill.active[data-opt="speed"] { background: var(--speed-strong); border-color: var(--speed-strong); color: var(--on-primary); }
  .session.day5 .option-tabs .pill.active[data-opt="rest"] { background: var(--rest-strong); border-color: var(--rest-strong); color: var(--text); }
  .session.day5 .option-panel[data-panel="speed"] .subhead { border-left-color: var(--speed-strong); }
  .session.day5 .option-panel[data-panel="rest"] .meta-line { background: rgba(255,255,255,.03); color: var(--text); }

  .exo { display: grid; grid-template-columns: 36px 1fr; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--line); align-items: baseline; }
  .exo .bloc { color: var(--muted); font-size: 11px; font-weight: 700; padding-top: 2px; }
  .exo .body { font-size: 14px; line-height: 1.4; }
  .exo .name a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .exo .name a:hover { text-decoration: underline; }
  .exo .name .noplay { color: var(--text); font-weight: 600; }
  .exo .detail { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .exo .detail.pending { color: var(--pending); font-style: italic; }
  .exo .rest { color: #C9BDB0; font-size: 11px; margin-top: 4px; font-weight: 600; }
  .exo .note { color: var(--muted); font-size: 11px; margin-top: 3px; font-style: italic; padding: 4px 8px; background: rgba(255,255,255,.03); border-left: 2px solid var(--line); border-radius: 2px; }

  .bloc-note { padding: 8px 16px; font-size: 12px; color: var(--muted); font-style: italic; background: rgba(255,255,255,.03); border-top: 1px solid var(--line); }

  .day5-help { padding: 14px 16px; font-size: 13px; line-height: 1.5; color: var(--text); background: rgba(242,117,43,.07); border-bottom: 1px solid var(--line); }
  .day5-help ul { margin: 8px 0; padding-left: 18px; }
  .day5-help li { margin-bottom: 6px; }

  .session.day5 .subhead.bloc-speed-main { border-left-color: var(--speed-strong); }
  .session.day5 .subhead.bloc-metcon { border-left-color: var(--happy); }
  .session.day5 .subhead.bloc-density-choice { border-left-color: var(--happy); font-size: 11px; }

  .option-tabs { display: flex; gap: 6px; padding: 0 16px 12px; flex-wrap: wrap; }
  .option-tabs .pill { font-size: 12px; padding: 5px 12px; }
  .option-panel { display: none; }
  .option-panel.active { display: block; }

  .meta-line { padding: 8px 16px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); background: rgba(255,255,255,.03); }

  .session.guide h2 { background: var(--primary); color: var(--on-primary); }
  .guide-sec { padding: 10px 16px; font-size: 12px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; background: rgba(242,117,43,.09); color: var(--primary); border-top: 1px solid var(--line); }
  .guide-block { padding: 12px 16px; font-size: 13px; line-height: 1.55; color: var(--text); }
  .guide-block ul { margin: 6px 0; padding-left: 18px; }
  .guide-block li { margin-bottom: 6px; }
  .guide-block strong { color: var(--text); }
  .guide-block .todo { color: var(--pending); background: var(--pending-bg); padding: 1px 5px; border-radius: 3px; }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 50; align-items: center; justify-content: center; padding: 16px; }
  .modal.open { display: flex; }
  .modal-inner { background: black; border-radius: 8px; max-width: 540px; width: 100%; aspect-ratio: 9/16; max-height: 90vh; position: relative; }
  .modal-close { position: absolute; top: -36px; right: 0; background: var(--text); color: #141210; border: none; border-radius: 999px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; font-weight: 700; }
  .modal iframe { width: 100%; height: 100%; border: 0; border-radius: 8px; }

  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 11px; }

  .name-bar { background: var(--bg); border-bottom: 1px solid var(--line); padding: 8px 16px; font-size: 12px; }
  .name-ask, .name-greet { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; color: var(--muted); }
  .name-ask input { background: var(--surface); border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 5px 9px; font-size: 12px; font-family: inherit; width: 140px; }
  .link-btn { background: none; border: none; color: var(--accent); font-size: 12px; font-weight: 700; cursor: pointer; padding: 2px 4px; font-family: inherit; }
  .link-btn:hover { text-decoration: underline; }

  .progress-wrap-outer { background: var(--bg); border-bottom: 1px solid var(--line); padding: 10px 16px; }
  .week-progress-icons { display: flex; justify-content: space-between; gap: 10px; }
  .week-progress-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; opacity: .72; transition: opacity .2s ease; }
  .week-progress-item.current { opacity: 1; }
  .logo-progress { width: 36px; height: 36px; flex: 0 0 auto; }
  .logo-progress svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .logo-progress .logo-base { color: var(--line); }
  .logo-progress .logo-fill { fill: var(--primary); transition: y .5s ease, height .5s ease; }
  .week-progress-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
  .week-progress-item.current .week-progress-label { color: var(--primary); }
  .progress-summary { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

  .session-track { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; }
  .done-toggle { display: flex; align-items: center; gap: 10px; background: none; border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text); padding: 0; }
  .done-toggle .done-icon { width: 28px; height: 28px; color: var(--line); transition: color .2s ease, transform .2s ease; flex: 0 0 auto; }
  .done-toggle .done-icon svg { width: 100%; height: 100%; display: block; }
  .done-toggle:hover .done-icon { color: var(--muted); }
  .done-toggle.done .done-icon { color: var(--accent); transform: scale(1.08); }
  .done-toggle.done:hover .done-icon { color: var(--accent); }
  .feel-note { width: 100%; margin-top: 10px; background: var(--bg); border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 44px; }
  .feel-note::placeholder { color: var(--muted); }

  .day-tabs .pill.day-done { border-color: var(--accent); }
</style>
</head>

function loadProgress() {
  try {
    const raw = localStorage.getItem("bgb_progress");
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { sessions: {}, notes: {}, name: "" };
}
function saveProgress() {
  try { localStorage.setItem("bgb_progress", JSON.stringify(progress)); } catch (e) {}
}
let progress = loadProgress();
const TOTAL_SESSIONS = 20;

function renderNameBar() {
  const wrap = document.getElementById("nameWrap");
  if (progress.name) {
    wrap.className = "name-bar";
    wrap.innerHTML = '<div class="name-greet">Salut ' + escapeHtml(progress.name) + ' <button id="editName" class="link-btn">modifier</button></div>';
    document.getElementById("editName").addEventListener("click", () => {
      progress.name = ""; saveProgress(); renderNameBar();
    });
  } else {
    wrap.className = "name-bar";
    wrap.innerHTML = '<div class="name-ask"><span>Comment tu t\'appelles ?</span><input id="nameInput" type="text" placeholder="Ton prenom" maxlength="24"><button id="nameOk" class="link-btn">OK</button></div>';
    document.getElementById("nameOk").addEventListener("click", saveName);
    document.getElementById("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") saveName(); });
  }
}
function saveName() {
  const input = document.getElementById("nameInput");
  const v = input.value.trim();
  if (!v) return;
  progress.name = v;
  saveProgress();
  renderNameBar();
}

function progressLogoSVG(pct) {
  const fillY = 100 - pct;
  return '<svg viewBox="0 0 100 100">' +
    '<defs><clipPath id="gClip">' + SYMBOL_G + '</clipPath></defs>' +
    '<g class="logo-base">' + SYMBOL_G + '</g>' +
    '<rect class="logo-fill" x="0" y="' + fillY + '" width="100" height="' + pct + '" clip-path="url(#gClip)"/>' +
  '</svg>';
}

function weekProgressPct(week) {
  let done = 0;
  for (let d = 1; d <= 5; d++) { if (progress.sessions["w" + week + "d" + d]) done++; }
  return Math.round((done / 5) * 100);
}

function renderProgressBar() {
  const wrap = document.getElementById("progressWrap");
  const done = Object.values(progress.sessions).filter(Boolean).length;
  let icons = "";
  for (let w = 1; w <= 4; w++) {
    const pct = weekProgressPct(w);
    const current = (state.view === "program" && state.week === w) ? " current" : "";
    icons += '<div class="week-progress-item' + current + '">' +
               '<span class="logo-progress">' + progressLogoSVG(pct) + '</span>' +
               '<span class="week-progress-label">S' + w + '</span>' +
             '</div>';
  }
  wrap.className = "progress-wrap-outer";
  wrap.innerHTML =
    '<div class="week-progress-icons">' + icons + '</div>' +
    '<div class="progress-summary">' + done + '/' + TOTAL_SESSIONS + ' seances terminees</div>';
}

function renderSessionTrack() {
  const key = "w" + state.week + "d" + state.day;
  const done = !!progress.sessions[key];
  const note = progress.notes[key] || "";
  return '<div class="session-track">' +
    '<button type="button" id="doneToggle" class="done-toggle' + (done ? " done" : "") + '" aria-pressed="' + done + '">' +
      '<span class="done-icon"><svg viewBox="0 0 100 100">' + SYMBOL_G + '</svg></span>' +
      '<span id="doneLabel">' + (done ? "Seance terminee" : "Marquer la seance comme terminee") + '</span>' +
    '</button>' +
    '<textarea id="feelNote" class="feel-note" placeholder="Ton ressenti (optionnel) - reste sur cet appareil, envoie-le a Charles si tu veux le partager">' + escapeHtml(note) + '</textarea>' +
  '</div>';
}

function bindTrack() {
  const key = "w" + state.week + "d" + state.day;
  const btn = document.getElementById("doneToggle");
  const ta = document.getElementById("feelNote");
  if (btn) {
    btn.addEventListener("click", () => {
      const now = !progress.sessions[key];
      progress.sessions[key] = now;
      saveProgress();
      btn.classList.toggle("done", now);
      btn.setAttribute("aria-pressed", String(now));
      document.getElementById("doneLabel").textContent = now ? "Seance terminee" : "Marquer la seance comme terminee";
      renderProgressBar();
      renderDayTabs();
    });
  }
  if (ta) {
    ta.addEventListener("input", () => {
      progress.notes[key] = ta.value;
      saveProgress();
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function exoRow(bloc, name, detail, vid, rest, note) {
  const nameSafe = escapeHtml(name);
  const detailSafe = escapeHtml(detail || "");
  const nameHtml = vid
    ? '<a href="' + YT(vid) + '" target="_blank" rel="noopener" data-vid="' + vid + '">' + nameSafe + '</a>'
    : '<span class="noplay">' + nameSafe + '</span>';
  const detailHtml = detailSafe
    ? '<div class="detail">' + detailSafe + '</div>'
    : '';
  const restHtml = rest ? '<div class="rest">' + escapeHtml(rest) + '</div>' : '';
  const noteHtml = note ? '<div class="note">' + escapeHtml(note) + '</div>' : '';
  return '<div class="exo"><div class="bloc">' + escapeHtml(bloc || "") + '</div><div class="body"><div class="name">' + nameHtml + '</div>' + detailHtml + restHtml + noteHtml + '</div></div>';
}

function renderStrength(letter, variant) {
  const mob = MOB[letter];
  const main = MAIN[letter + "|" + variant];
  const variantTag = variant === "prog" ? '<span class="tag">progresse</span>' : '<span class="tag">base</span>';

  // Split main block by family (A* / B* / C*) so subheads get the right color
  const blocA = main.filter(r => r[0].startsWith("A"));
  const blocB = main.filter(r => r[0].startsWith("B"));
  const blocC = main.filter(r => r[0].startsWith("C"));

  let html = '<div class="session s-' + letter + '">' +
             '<h2>Strength ' + letter + ' ' + variantTag + '</h2>' +
             '<div class="subhead bloc-prep">Mobilite &amp; Activation</div>' +
             '<div class="bloc-note">3 tours - Not For Time. Enchaine les 5 exercices dans l\'ordre, puis recommence 2 fois de plus. Pas de chrono, juste de la qualite de mouvement.</div>';
  mob.forEach(row => html += exoRow(row[0], row[1], row[2], row[3], "", ""));
  if (blocA.length) {
    html += '<div class="subhead bloc-A">Max + Vitesse (iso + balistique)</div>' +
            '<div class="bloc-note">A faire en alternance, pas l\'un apres l\'autre : A1 puis recup courte, A2 puis recup longue, et on recommence jusqu\'a finir les series. La recup courte apres A1 sert a booster l\'explosivite de A2.</div>';
    blocA.forEach(row => html += exoRow(row[0], row[1], row[2], row[3], row[4], row[5]));
  }
  if (blocB.length) {
    html += '<div class="subhead bloc-B">Force-endurance (tempo)</div>' +
            '<div class="bloc-note">A faire dans l\'ordre : toutes les series de B1 d\'abord, puis toutes les series de B2, puis toutes les series de B3. Ce n\'est pas un circuit.</div>';
    blocB.forEach(row => html += exoRow(row[0], row[1], row[2], row[3], row[4], row[5]));
  }
  if (blocC.length) {
    html += '<div class="subhead bloc-C">Finisher (for time)</div>';
    blocC.forEach(row => html += exoRow(row[0], row[1], row[2], row[3], row[4], row[5]));
  }
  html += '</div>';
  return html;
}

function renderEndurance(idx) {
  const e = ENDURANCE[idx];
  const is5k = e.name === "5K";
  const m = e.detail.match(/(\d+)x\((\d+)min @5k pace RPE7-8 \+ (\d+)min repos\)/);
  let tag, inner;
  if (is5k) {
    tag = "test";
    inner = '<div class="run-step main"><span class="lbl">Test 5K</span><span class="val">5 km chronometre, parcours plat</span></div>' +
            '<div class="bloc-note">Test de fin de bloc. Chronometre-toi sur 5 km, note ton temps, et refais le meme parcours plus tard pour comparer.</div>';
  } else if (m) {
    tag = "intervalles";
    const segs = e.detail.split(" / ");
    inner =
      '<div class="run-step"><span class="lbl">Echauffement</span><span class="val">' + escapeHtml(segs[0]) + '</span></div>' +
      '<div class="run-step"><span class="lbl">Transition</span><span class="val">' + escapeHtml(segs[1]) + '</span></div>' +
      '<div class="run-step main"><span class="lbl">Intervalles</span><span class="val">' + m[1] + ' x ' + m[2] + ' min a allure 5k (RPE 7-8), ' + m[3] + ' min repos entre chaque</span></div>' +
      '<div class="run-step"><span class="lbl">Transition</span><span class="val">' + escapeHtml(segs[3]) + '</span></div>' +
      '<div class="run-step"><span class="lbl">Retour calme</span><span class="val">' + escapeHtml(segs[4]) + '</span></div>';

function renderDensity(d) {
  let html = '<div class="meta-line">' + d.rounds + ', Amrap ' + d.amrap + ' par poste - ' + d.rest + '</div>';
  DENSITY_STATIONS.forEach(station => {
    if (station.alts.length === 1) {
      html += exoRow("", station.label, "Amrap " + d.amrap, station.alts[0][1], "", "");
    } else {
      const links = station.alts.map(alt => alt[1]
        ? '<a href="' + YT(alt[1]) + '" target="_blank" rel="noopener" data-vid="' + alt[1] + '">' + escapeHtml(alt[0]) + '</a>'
        : '<span class="noplay">' + escapeHtml(alt[0]) + '</span>'
      ).join(' <span class="alt-or">ou</span> ');
      html += '<div class="exo"><div class="bloc"></div><div class="body">' +
              '<div class="name">' + escapeHtml(station.label) + ' : ' + links + '</div>' +
              '<div class="detail">Amrap ' + escapeHtml(d.amrap) + '</div>' +
              '</div></div>';
    }
  });
  return html;
}

      '<ul>' +

    '</div>' +

    '<div class="guide-sec">Jour 5</div>' +
    '<div class="guide-block">' +
      'Jour 5 est au choix, sans pression. Les 4 seances obligatoires de la semaine (2 de force, 2 d\'endurance) forment deja un vrai bloc. Si tu as l\'energie pour une 5e seance, tu choisis Density, Speed + Metcon ou Rest selon ton etat (le detail est sur l\'onglet Jour 5). En cas de doute, Rest est un vrai choix d\'entrainement, pas un echec.' +
    '</div>' +

    '<div class="guide-sec">Astuce hors-ligne</div>' +
    '<div class="guide-block">' +
      'Les videos de demonstration sont hebergees sur YouTube. Si tu t\'entraines sans bonne connexion (salle d\'hotel, exterieur), previsualise les exos en wifi avant ta seance.' +
    '</div>' +
  '</div>';
}

function render() {
  const dayTabs = document.getElementById("dayTabs");
  if (state.view === "guide") {
    dayTabs.style.display = "none";
    document.getElementById("content").innerHTML = renderGuide();
    return;
  }
  dayTabs.style.display = "";
  const cfg = WEEKS[state.week];
  let html = "";
  if (state.day === 1) html = renderStrength(cfg.strDay1[0], cfg.strDay1[1]);
  else if (state.day === 2) html = renderEndurance(cfg.endIdx);
  else if (state.day === 3) html = renderStrength(cfg.strDay3[0], cfg.strDay3[1]);
  else if (state.day === 4) html = renderEndurance(cfg.endIdx + 1);
  else if (state.day === 5) html = renderDay5(state.week);
  html += renderSessionTrack();
  document.getElementById("content").innerHTML = html;
  bindLinks();
  bindOptionTabs();
  bindTrack();
}

function renderTabs() {
  const wt = document.getElementById("weekTabs");
  wt.innerHTML = "";
  const g = document.createElement("button");
  g.className = "pill" + (state.view === "guide" ? " active" : "");
  g.textContent = "Guide";
  g.onclick = () => { state.view = "guide"; renderTabs(); renderProgressBar(); render(); };
  wt.appendChild(g);
  for (let w = 1; w <= 4; w++) {
    const b = document.createElement("button");
    b.className = "pill" + (state.view === "program" && state.week===w?" active":"");
    b.textContent = "Semaine " + w;
    b.onclick = () => { state.view = "program"; state.week = w; renderTabs(); renderDayTabs(); renderProgressBar(); render(); };
    wt.appendChild(b);
  }
}

function renderDayTabs() {
  const dt = document.getElementById("dayTabs");
  dt.innerHTML = "";
  const labels = ["Jour 1 - Strength", "Jour 2 - Endurance", "Jour 3 - Strength", "Jour 4 - Endurance", "Jour 5 - au choix"];
  labels.forEach((lbl, i) => {
    const d = i + 1;
    const key = "w" + state.week + "d" + d;
    const done = !!progress.sessions[key];
    const b = document.createElement("button");
    b.className = "pill" + (state.day===d?" active":"") + (done ? " day-done" : "");
    b.textContent = lbl + (done ? " \u2713" : "");
    b.onclick = () => { state.day = d; renderDayTabs(); render(); };
    dt.appendChild(b);
  });
}

function bindLinks() {
  document.querySelectorAll("a[data-vid]").forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      openModal(a.getAttribute("data-vid"));
    });
  });
}

function bindOptionTabs() {
  document.querySelectorAll(".option-tabs .pill").forEach(b => {
    b.onclick = () => {
      state.option = b.getAttribute("data-opt");
      document.querySelectorAll(".option-tabs .pill").forEach(p => p.classList.toggle("active", p === b));
      document.querySelectorAll(".option-panel").forEach(p => p.classList.toggle("active", p.getAttribute("data-panel") === state.option));
    };
  });
}

function openModal(vid) {
  document.getElementById("modalFrame").src = YTEmbed(vid);
  document.getElementById("modal").classList.add("open");
}
function closeModal(e) {
  if (e && e.target.closest(".modal-inner")) return;
  document.getElementById("modal").classList.remove("open");
  document.getElementById("modalFrame").src = "";
}

renderNameBar();
renderProgressBar();
renderTabs();
renderDayTabs();
render();
</script>
</body>
</html>
