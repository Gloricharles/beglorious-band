<title>Beglorious Band - Programme</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --link: #1155cc;
    --pending: #9c5700;
    --pending-bg: #fff2cc;

    /* Couleur header global */
    --brand: #111827;

    /* Strength A : bleu nuit profond */
    --strA-strong: #1e3a5f;
    --strA-soft: #d6e2f0;

    /* Strength B : bleu acier */
    --strB-strong: #2c5282;
    --strB-soft: #d7e3f1;

    /* Strength C : bleu pétrole */
    --strC-strong: #1d4f63;
    --strC-soft: #d4e4ea;

    /* Strength D : bleu ardoise */
    --strD-strong: #3a4d6b;
    --strD-soft: #dbe0ea;

    /* Endurance : vert teal/sapin */
    --end-strong: #0f766e;
    --end-soft: #d2eae6;

    /* Jour 5 famille orange/accent */
    --j5-strong: #c2410c;
    --j5-soft: #fde4d3;
    --speed-strong: #d97706;
    --speed-soft: #fdecc7;
    --rest-strong: #6b7280;
    --rest-soft: #e5e7eb;

    /* Bloc C "finisher" : ton chaud commun à toutes les Strength */
    --finisher-soft: #fde4d3;
    --finisher-strong: #c2410c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  header { background: var(--brand); color: white; padding: 14px 18px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: .2px; }
  header .sub { font-size: 12px; opacity: .85; margin-top: 2px; }

  .controls { display: flex; gap: 8px; padding: 12px 14px; background: white; border-bottom: 1px solid var(--line); overflow-x: auto; }
  .pill { border: 1px solid var(--line); background: white; color: var(--ink); padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .pill.active { background: var(--brand); color: white; border-color: var(--brand); }
  .pill:hover:not(.active) { background: #f3f4f6; }

  main { padding: 14px; max-width: 800px; margin: 0 auto; }
  .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .day-tabs .pill { font-size: 12px; padding: 6px 12px; }
  .day-tabs .pill.active { background: #374151; border-color: #374151; }

  .session { background: var(--card); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 14px; }
  .session h2 { margin: 0; padding: 12px 16px; color: white; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .session h2 .tag { font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; opacity: .85; background: rgba(255,255,255,.18); padding: 2px 6px; border-radius: 4px; }
  .subhead { padding: 8px 16px; font-size: 12px; font-weight: 600; }

  /* Strength variants */
  .session.s-A h2 { background: var(--strA-strong); }
  .session.s-A .subhead { background: var(--strA-soft); color: var(--strA-strong); }
  .session.s-B h2 { background: var(--strB-strong); }
  .session.s-B .subhead { background: var(--strB-soft); color: var(--strB-strong); }
  .session.s-C h2 { background: var(--strC-strong); }
  .session.s-C .subhead { background: var(--strC-soft); color: var(--strC-strong); }
  .session.s-D h2 { background: var(--strD-strong); }
  .session.s-D .subhead { background: var(--strD-soft); color: var(--strD-strong); }

  /* Bloc-specific subhead overrides (within Strength) */
  .session .subhead.bloc-prep { opacity: .92; }
  .session .subhead.bloc-A::before { content: "Bloc A - "; font-weight: 700; }
  .session .subhead.bloc-B::before { content: "Bloc B - "; font-weight: 700; }
  .session .subhead.bloc-C { background: var(--finisher-soft); color: var(--finisher-strong); }
  .session .subhead.bloc-C::before { content: "Bloc C - "; font-weight: 700; }

  /* Endurance */
  .session.endurance h2 { background: var(--end-strong); }
  .session.endurance .subhead { background: var(--end-soft); color: var(--end-strong); }

  /* Jour 5 */
  .session.day5 h2 { background: var(--j5-strong); }
  .session.day5 .subhead { background: var(--j5-soft); color: var(--j5-strong); }
  .session.day5 .option-tabs .pill.active[data-opt="density"] { background: var(--j5-strong); border-color: var(--j5-strong); color: white; }
  .session.day5 .option-tabs .pill.active[data-opt="speed"] { background: var(--speed-strong); border-color: var(--speed-strong); color: white; }
  .session.day5 .option-tabs .pill.active[data-opt="rest"] { background: var(--rest-strong); border-color: var(--rest-strong); color: white; }
  .session.day5 .option-panel[data-panel="speed"] .subhead { background: var(--speed-soft); color: var(--speed-strong); }
  .session.day5 .option-panel[data-panel="rest"] .meta-line { background: var(--rest-soft); color: var(--ink); }

  .exo { display: grid; grid-template-columns: 36px 1fr; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--line); align-items: baseline; }
  .exo .bloc { color: var(--muted); font-size: 11px; font-weight: 600; padding-top: 2px; }
  .exo .body { font-size: 14px; line-height: 1.4; }
  .exo .name a { color: var(--link); text-decoration: none; font-weight: 500; }
  .exo .name a:hover { text-decoration: underline; }
  .exo .name .noplay { color: var(--ink); font-weight: 500; }
  .exo .detail { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .exo .detail.pending { color: var(--pending); font-style: italic; }
  .exo .rest { color: #4b5563; font-size: 11px; margin-top: 4px; font-weight: 500; }
  .exo .note { color: var(--muted); font-size: 11px; margin-top: 3px; font-style: italic; padding: 4px 8px; background: #fafbfc; border-left: 2px solid var(--line); border-radius: 2px; }

  .bloc-note { padding: 8px 16px; font-size: 12px; color: var(--muted); font-style: italic; background: #fafbfc; border-top: 1px solid var(--line); }

  .day5-help { padding: 14px 16px; font-size: 13px; line-height: 1.5; color: var(--ink); background: #fff8f3; border-bottom: 1px solid var(--line); }
  .day5-help ul { margin: 8px 0; padding-left: 18px; }
  .day5-help li { margin-bottom: 6px; }

  .session.day5 .subhead.bloc-speed-main { background: var(--speed-soft); color: var(--speed-strong); }
  .session.day5 .subhead.bloc-metcon { background: var(--j5-soft); color: var(--j5-strong); }
  .session.day5 .subhead.bloc-density-choice { background: var(--j5-soft); color: var(--j5-strong); font-size: 11px; }

  .option-tabs { display: flex; gap: 6px; padding: 0 16px 12px; flex-wrap: wrap; }
  .option-tabs .pill { font-size: 12px; padding: 5px 12px; }
  .option-panel { display: none; }
  .option-panel.active { display: block; }

  .meta-line { padding: 8px 16px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); background: #fafbfc; }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 50; align-items: center; justify-content: center; padding: 16px; }
  .modal.open { display: flex; }
  .modal-inner { background: black; border-radius: 8px; max-width: 540px; width: 100%; aspect-ratio: 9/16; max-height: 90vh; position: relative; }
  .modal-close { position: absolute; top: -36px; right: 0; background: white; border: none; border-radius: 999px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; font-weight: 600; }
  .modal iframe { width: 100%; height: 100%; border: 0; border-radius: 8px; }

  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 11px; }
</style>

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function exoRow(bloc, name, detail, vid, rest, note) {
  const nameSafe = escapeHtml(name);
  const detailSafe = escapeHtml(detail || "");
  const nameHtml = vid
    ? '<a href="' + YT(vid) + '" target="_blank" rel="noopener" data-vid="' + vid + '">' + nameSafe + '</a>'
    : '<span class="noplay">' + nameSafe + '</span>';
  const detailHtml = vid
    ? '<div class="detail">' + detailSafe + '</div>'
    : '<div class="detail pending">' + (detailSafe ? detailSafe + "  " : "") + '[video a venir]</div>';
  const restHtml = rest ? '<div class="rest">' + escapeHtml(rest) + '</div>' : '';
  const noteHtml = note ? '<div class="note">' + escapeHtml(note) + '</div>' : '';
  return '<div class="exo"><div class="bloc">' + escapeHtml(bloc || "") + '</div><div class="body"><div class="name">' + nameHtml + '</div>' + detailHtml + restHtml + noteHtml + '</div></div>';
}

function renderStrength(letter, variant) {

  const blocC = main.filter(r => r[0].startsWith("C"));

             '<h2>Strength ' + letter + ' ' + variantTag + '</h2>' +
             '<div class="subhead bloc-prep">Mobilite &amp; Activation</div>';

  if (blocA.length) {
    html += '<div class="subhead bloc-A">Max + Vitesse (iso + balistique)</div>';
    blocA.forEach(row => html += exoRow(row[0], row[1], row[2], row[3], row[4], row[5]));
  }
  if (blocB.length) {
    html += '<div class="subhead bloc-B">Force-endurance (tempo)</div>' +
            '<div class="bloc-note">A faire dans l\'ordre : toutes les series de B1 d\'abord, puis toutes les series de B2, puis toutes les series de B3. Ce n\'est pas un circuit.</div>';
    blocB.forEach(row => html += exoRow(row[0], row[1], row[2], row[3], row[4], row[5]));
  }
  if (blocC.length) {
    html += '<div class="subhead bloc-C">Finisher (for time)</div>';
    blocC.forEach(row => html += exoRow(row[0], row[1], row[2], row[3], row[4], row[5]));
  }
  html += '</div>';
  return html;
}

function renderEndurance(idx) {
  const e = ENDURANCE[idx];
  return '<div class="session endurance"><h2>Endurance</h2>' + exoRow("", e.name, e.detail, "", "", "") + '</div>';
}

function renderDensity(d) {
  let html = '<div class="meta-line">' + d.rounds + ', Amrap ' + d.amrap + ' par poste - ' + d.rest + '</div>';
  DENSITY_STATIONS.forEach(station => {
    if (station.alts.length === 1) {
      html += exoRow("", station.label, "Amrap " + d.amrap, station.alts[0][1], "", "");
    } else {
      html += '<div class="subhead bloc-density-choice">' + escapeHtml(station.label) + ' - Amrap ' + escapeHtml(d.amrap) + '</div>';
      station.alts.forEach((alt, i) => {
        const prefix = i === 0 ? "" : "ou";
        html += exoRow(prefix, alt[0], "", alt[1], "", "");
      });
    }
  });
  return html;
}

function renderSpeed(s) {
  let html = '<div class="subhead">Drills techniques (echauffement specifique)</div>';
  html += '<div class="bloc-note">' + escapeHtml(s.drill) + '</div>';
  SPEED_DRILLS.forEach((row, i) => html += exoRow(String(i+1), row[0], "", row[1], "", ""));
  html += '<div class="subhead bloc-speed-main">Travail principal - ' + escapeHtml(s.accelflysLabel || "Flys / Acceleration") + '</div>' +
          '<div class="bloc-note">' + escapeHtml(s.accelflys) + '</div>';
  html += '<div class="subhead bloc-metcon">Metcon</div>' +
          '<div class="bloc-note">' + escapeHtml(s.metconFormat) + '</div>';
  s.metcon.forEach((row, i) => html += exoRow(String(i+1), row[0], "", row[1], "", ""));
  return html;
}

function renderDay5(week) {
  const cfg = WEEKS[week];
  const d = DENSITY[cfg.density];
  const s = SPEED[cfg.speed];
  const helpText =
    '<div class="day5-help">' +
      '<strong>Jour 5 - a toi de choisir.</strong> Cette journee s\'adapte a ton etat du moment et a ton contexte.' +
      '<ul>' +
        '<li><strong>Density</strong> ajoute du conditionnement musculaire. A privilegier si tu veux du travail supplementaire mais que tu n\'as ni l\'espace ni l\'envie de sprinter.</li>' +
        '<li><strong>Speed + Metcon</strong> travaille la vitesse, la puissance et le cardio. A privilegier si tu te sens frais et que tu as acces a un sol stable et plat.</li>' +
        '<li><strong>Rest</strong> est un vrai choix d\'entrainement, pas un echec. A privilegier en cas de fatigue, courbatures inhabituelles, mauvais sommeil ou journee de transport.</li>' +
      '</ul>' +
      'En cas de doute, choisis Rest plutot qu\'une seance baclee.' +
    '</div>';
  return '<div class="session day5"><h2>Jour 5 - au choix</h2>' +
    helpText +
    '<div class="option-tabs">' +
      '<button class="pill ' + (state.option==='density'?'active':'') + '" data-opt="density">Option 1 - ' + d.name + '</button>' +
      '<button class="pill ' + (state.option==='speed'?'active':'') + '" data-opt="speed">Option 2 - ' + s.name + '</button>' +
      '<button class="pill ' + (state.option==='rest'?'active':'') + '" data-opt="rest">Option 3 - Rest</button>' +
    '</div>' +
    '<div class="option-panel ' + (state.option==='density'?'active':'') + '" data-panel="density">' + renderDensity(d) + '</div>' +
    '<div class="option-panel ' + (state.option==='speed'?'active':'') + '" data-panel="speed">' + renderSpeed(s) + '</div>' +
    '<div class="option-panel ' + (state.option==='rest'?'active':'') + '" data-panel="rest"><div class="meta-line">Repos complet.</div></div>' +
  '</div>';
}

function render() {
  const cfg = WEEKS[state.week];
  let html = "";
  if (state.day === 1) html = renderStrength(cfg.strDay1[0], cfg.strDay1[1]);
  else if (state.day === 2) html = renderEndurance(cfg.endIdx);
  else if (state.day === 3) html = renderStrength(cfg.strDay3[0], cfg.strDay3[1]);
  else if (state.day === 4) html = renderEndurance(cfg.endIdx + 1);
  else if (state.day === 5) html = renderDay5(state.week);
  document.getElementById("content").innerHTML = html;
  bindLinks();
  bindOptionTabs();
}

function renderTabs() {
  const wt = document.getElementById("weekTabs");
  wt.innerHTML = "";
  for (let w = 1; w <= 4; w++) {
    const b = document.createElement("button");
    b.className = "pill" + (state.week===w?" active":"");
    b.textContent = "Semaine " + w;
    b.onclick = () => { state.week = w; renderTabs(); render(); };
    wt.appendChild(b);
  }
}

function renderDayTabs() {
  const dt = document.getElementById("dayTabs");
  dt.innerHTML = "";
  const labels = ["Jour 1 - Strength", "Jour 2 - Endurance", "Jour 3 - Strength", "Jour 4 - Endurance", "Jour 5 - au choix"];
  labels.forEach((lbl, i) => {
    const d = i + 1;
    const b = document.createElement("button");
    b.className = "pill" + (state.day===d?" active":"");
    b.textContent = lbl;
    b.onclick = () => { state.day = d; renderDayTabs(); render(); };
    dt.appendChild(b);
  });
}

function bindLinks() {
  document.querySelectorAll("a[data-vid]").forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      openModal(a.getAttribute("data-vid"));
    });
  });
}

function bindOptionTabs() {
  document.querySelectorAll(".option-tabs .pill").forEach(b => {
    b.onclick = () => {
      state.option = b.getAttribute("data-opt");
      document.querySelectorAll(".option-tabs .pill").forEach(p => p.classList.toggle("active", p === b));
      document.querySelectorAll(".option-panel").forEach(p => p.classList.toggle("active", p.getAttribute("data-panel") === state.option));
    };
  });
}

function openModal(vid) {
  document.getElementById("modalFrame").src = YTEmbed(vid);
  document.getElementById("modal").classList.add("open");
}
function closeModal(e) {
  if (e && e.target.closest(".modal-inner")) return;
  document.getElementById("modal").classList.remove("open");
  document.getElementById("modalFrame").src = "";
}

renderTabs();
renderDayTabs();
render();
</script>
</body>
</html>
